<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>信徒生活須知｜線上練習</title><link rel="manifest" href="manifest.json"><style>
:root{--bg:#f5f7fb;--card:#fff;--ink:#1e293b;--muted:#64748b;--brand:#2563eb;--ok:#16a34a;--bad:#dc2626;--line:#e2e8f0}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eef6ff,#f8fafc);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;color:var(--ink)}header{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}.wrap{max-width:960px;margin:0 auto;padding:16px}h1{font-size:24px;margin:0 0 4px}.sub{color:var(--muted);font-size:14px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.tab,.btn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer}.tab.active,.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}main{max-width:960px;margin:0 auto;padding:18px 16px 80px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 10px 25px rgba(15,23,42,.06);margin-bottom:14px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.select,input{border:1px solid var(--line);border-radius:14px;padding:11px 12px;background:#fff;min-height:44px}input{flex:1;min-width:220px}.question{font-size:22px;font-weight:900;line-height:1.45;margin:12px 0}.meta{font-size:13px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}.pill{background:#eff6ff;color:#1d4ed8;border-radius:999px;padding:5px 9px}.option{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:16px;padding:14px 14px;margin:10px 0;font-size:17px;cursor:pointer}.option.correct{border-color:var(--ok);background:#ecfdf5}.option.wrong{border-color:var(--bad);background:#fef2f2}.explain{background:#f8fafc;border-left:5px solid var(--brand);padding:13px;border-radius:12px;margin-top:12px;line-height:1.7}.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}.stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.num{font-size:28px;font-weight:900}.hide{display:none}.small{font-size:13px;color:var(--muted)}footer{color:var(--muted);font-size:12px;text-align:center;padding:20px}</style></head><body><header><div class="wrap"><h1>信徒生活須知｜線上練習</h1><div class="sub">依 PDF 內容整理成題庫，可離線練習、錯題複習與統計。</div><div class="tabs"><button class="tab active" data-view="practice">練習</button><button class="tab" data-view="mock">模擬考</button><button class="tab" data-view="wrong">錯題本</button><button class="tab" data-view="stats">統計</button></div></div></header><main><section id="practice" class="view"><div class="card"><div class="row"><select id="chapter" class="select"></select><input id="keyword" placeholder="搜尋題目、章節、主題"><button class="btn primary" id="start">開始出題</button></div></div><div id="quiz"></div></section><section id="mock" class="view hide"><div class="card"><h2>模擬考</h2><p class="small">隨機抽 20 題，作答後一次看分數。</p><button class="btn primary" id="startMock">開始模擬考</button></div><div id="mockBox"></div></section><section id="wrong" class="view hide"><div class="card"><h2>錯題本</h2><p class="small">答錯的題目會自動加入，答對後可從錯題本移除。</p><button class="btn primary" id="practiceWrong">練習錯題</button></div><div id="wrongBox"></div></section><section id="stats" class="view hide"><div class="card"><h2>學習統計</h2><div id="statsBox" class="statgrid"></div><p class="small">資料儲存在本機瀏覽器 localStorage。</p></div></section></main><footer>True Jesus Church learning quiz - static web app</footer><script src="app.js"></script></body></html>
